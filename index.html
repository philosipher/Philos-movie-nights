          div = document.createElement('div');
          div.id = 'debug-error';
          div.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999999;background:#b90009;color:#fff;padding:16px;font-family:monospace;font-size:13px;word-break:break-all;box-shadow:0 10px 30px rgba(0,0,0,0.5);';
          document.body.appendChild(div);

        div.innerHTML = '<strong>App Error:</strong> ' + (e.message || e.error || e) + '<br><small>' + (e.filename || '') + ':' + (e.lineno || '') + '</small>';
      });

          document.body.appendChild(div);
        }

      });
